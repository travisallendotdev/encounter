<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dice Fight — Sign in (Arcane Slate)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/arcane.css" />
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 28px; }
  .gate { width: 100%; max-width: 420px; text-align: center; position: relative; z-index: 2; }
  .gate-mark { width: 64px; height: 64px; margin: 0 auto 24px; color: var(--accent); filter: drop-shadow(0 0 20px var(--accent-glow)); animation: floaty 6s ease-in-out infinite; }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-6px) rotate(-3deg); } }
  .gate-title { font-family: var(--font-display); font-weight: 700; font-size: clamp(40px,9vw,54px); line-height: 1; letter-spacing: -0.03em; }
  .gate-title b { color: var(--accent); }
  .gate-tag { margin-top: 12px; color: var(--muted); font-size: 15.5px; }
  .gate-tag .em { color: var(--fg); font-weight: 600; }
  .gate-card { margin-top: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px 24px 22px; box-shadow: var(--shadow); text-align: left; }
  .gate-card .label { margin-bottom: 9px; display: block; }
  .gate-input { font-size: 17px; padding: 15px 16px; }
  .gate-card .btn-lg { width: 100%; margin-top: 14px; }
  .gate-note { margin-top: 15px; text-align: center; font-size: 12.5px; color: var(--faint); line-height: 1.5; }
  .gate-note b { color: var(--muted); font-weight: 600; }
  .grid-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px; mask-image: radial-gradient(70% 55% at 50% 40%, #000 0%, transparent 75%); opacity: .5; }
</style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <main class="gate">
    <div class="gate-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"><path d="M12 2.3 20 7v10l-8 4.7L4 17V7l8-4.7Z"/><path d="M4 7l8 4.6L20 7M12 11.6V21.7M4 17l8-5 8 5"/></svg>
    </div>
    <h1 class="gate-title">Dice<b>Fight</b></h1>
    <p class="gate-tag">Gather the party. <span class="em">Roll for initiative.</span></p>
    <form class="gate-card" action="campaigns-arcane.html">
      <label class="label" for="dm">Dungeon Master name</label>
      <input class="input gate-input" id="dm" name="dm" type="text" placeholder="What do they call you at the table?" autocomplete="off" autofocus />
      <button class="btn btn-primary btn-lg" type="submit">
        Enter the table
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
      <p class="gate-note">No password. <b>A new name spins up a new account</b> — an existing one picks up where you left off.</p>
    </form>
  </main>
</body>
</html>
