<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dice Fight — Take a Seat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/app.css" />
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 28px; }
  .gate {
    width: 100%; max-width: 430px; text-align: center;
    position: relative; z-index: 2;
  }
  .gate-mark {
    width: 76px; height: 76px; margin: 0 auto 26px; color: var(--accent);
    filter: drop-shadow(0 0 22px var(--accent-glow));
    animation: floaty 6s ease-in-out infinite;
  }
  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-7px) rotate(-3deg); } }
  .gate-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(40px, 9vw, 58px); line-height: 1; letter-spacing: 0.03em;
  }
  .gate-title b { color: var(--accent); font-weight: 700; }
  .gate-tag {
    margin-top: 14px; color: var(--muted); font-size: 15.5px; letter-spacing: 0.02em;
  }
  .gate-tag .em { color: var(--fg); font-style: italic; font-family: var(--font-display); }
  .gate-card {
    margin-top: 34px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 26px 24px 24px; box-shadow: var(--shadow);
    text-align: left;
  }
  .gate-card .label { margin-bottom: 9px; display: block; }
  .gate-input { font-size: 17px; padding: 15px 16px; }
  .gate-card .btn-lg { width: 100%; margin-top: 14px; }
  .gate-note {
    margin-top: 16px; text-align: center; font-size: 12.5px; color: var(--faint);
    line-height: 1.5;
  }
  .gate-note b { color: var(--muted); font-weight: 600; }
  /* scattered dice glow in the background */
  .embers { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .embers span {
    position: absolute; color: var(--border-2); opacity: .5;
  }
  .embers span svg { width: 100%; height: 100%; }
  .e1 { top: 14%; left: 12%; width: 64px; height: 64px; transform: rotate(-18deg); }
  .e2 { bottom: 16%; right: 13%; width: 92px; height: 92px; transform: rotate(22deg); opacity: .35; }
  .e3 { bottom: 26%; left: 18%; width: 44px; height: 44px; transform: rotate(8deg); opacity: .4; }
  .e4 { top: 20%; right: 20%; width: 52px; height: 52px; transform: rotate(-10deg); opacity: .3; }
</style>
</head>
<body>
  <div class="embers" aria-hidden="true">
    <span class="e1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M12 2.3 20 7v10l-8 4.7L4 17V7l8-4.7Z"/><path d="M4 7l8 4.6L20 7M12 11.6V21.7M4 17l8-5 8 5"/></svg></span>
    <span class="e2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M12 2.3 20 7v10l-8 4.7L4 17V7l8-4.7Z"/><path d="M4 7l8 4.6L20 7M12 11.6V21.7M4 17l8-5 8 5"/></svg></span>
    <span class="e3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="3.5"/><circle cx="8" cy="8" r="1.3" fill="currentColor"/><circle cx="16" cy="16" r="1.3" fill="currentColor"/><circle cx="12" cy="12" r="1.3" fill="currentColor"/></svg></span>
    <span class="e4"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="3.5"/><circle cx="8" cy="8" r="1.3" fill="currentColor"/><circle cx="16" cy="8" r="1.3" fill="currentColor"/><circle cx="8" cy="16" r="1.3" fill="currentColor"/><circle cx="16" cy="16" r="1.3" fill="currentColor"/></svg></span>
  </div>

  <main class="gate">
    <div class="gate-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"><path d="M12 2.3 20 7v10l-8 4.7L4 17V7l8-4.7Z"/><path d="M4 7l8 4.6L20 7M12 11.6V21.7M4 17l8-5 8 5"/></svg>
    </div>
    <h1 class="gate-title">Dice<b>Fight</b></h1>
    <p class="gate-tag">Gather the party. <span class="em">Roll for initiative.</span></p>

    <form class="gate-card" action="campaigns.html">
      <label class="label" for="dm">Dungeon Master name</label>
      <input class="input gate-input" id="dm" name="dm" type="text" placeholder="What do they call you at the table?" autocomplete="off" autofocus />
      <button class="btn btn-primary btn-lg" type="submit">
        Take your seat
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
      <p class="gate-note">No password, no fuss. <b>A new name conjures a new account</b> — an old one picks up right where you left off.</p>
    </form>
  </main>
</body>
</html>
